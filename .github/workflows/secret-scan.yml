# =============================================================================
# Secret Scan — Auto-detect credentials sebelum merge ke GitHub
# =============================================================================
# Workflow ini menggunakan Gitleaks (open-source) untuk memindai setiap push
# dan pull request dari hardcoded credentials, API keys, password, token, dll.
#
# Jika ada data sensitif terdeteksi, workflow akan FAIL dan mencegah merge.
#
# Cara aktivasi:
#   1. Push file ini ke GitHub (.github/workflows/secret-scan.yml)
#   2. Workflow otomatis jalan di setiap push & PR
#
# Referensi: https://github.com/gitleaks/gitleaks
# =============================================================================

name: 🔍 Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (full history untuk diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Format SARIF untuk integrasi dengan GitHub Code Scanning
          report-format: sarif
          report-path: results.sarif
          # Path ke konfigurasi kustom (.gitleaks.toml)
          config-path: .gitleaks.toml

      - name: Upload SARIF ke GitHub Code Scanning
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gitleaks

      - name: Summary hasil scan
        if: always()
        run: |
          if [ -f results.sarif ]; then
            ISSUES=$(jq '.runs[0].results | length' results.sarif 2>/dev/null || echo 0)
            echo "### 📋 Hasil Gitleaks Secret Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "$ISSUES" -gt 0 ]; then
              echo "❌ **$ISSUES potensi secrets terdeteksi!**" >> $GITHUB_STEP_SUMMARY
              echo "🔍 Lihat detail di tab **Security > Code scanning**" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Tidak ada secrets terdeteksi. Aman!" >> $GITHUB_STEP_SUMMARY
            fi
          fi
