# =============================================================================
# Secret Scan — Auto-detect credentials sebelum merge ke GitHub
# =============================================================================
# Workflow ini menggunakan Gitleaks (open-source) untuk memindai setiap push
# dan pull request dari hardcoded credentials, API keys, password, token, dll.
#
# Jika ada data sensitif terdeteksi, workflow akan FAIL dan mencegah merge.
#
# Cara aktivasi:
#   1. Push file ini ke GitHub (.github/workflows/secret-scan.yml)
#   2. Workflow otomatis jalan di setiap push & PR
#
# Referensi: https://github.com/gitleaks/gitleaks
# =============================================================================

name: 🔍 Secret Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (detect)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # opsional untuk versi PRO
        with:
          # Format laporan: json (default) atau sarif (untuk GitHub code scanning)
          report-format: sarif
          # Fail action jika ditemukan secret
          fail: true
          # Scan dari commit terakhir hingga HEAD (efisien untuk PR)
          # Untuk full scan, hapus baris ini
          scan-range: "${{ github.event.before }}..${{ github.event.after }}"

      - name: Upload SARIF report ke GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Summary hasil scan
        if: always()
        run: |
          if [ -f gitleaks.sarif ]; then
            echo "### 📋 Hasil Gitleaks Secret Scan" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Scan selesai. Lihat detail di tab **Security > Code scanning**" >> $GITHUB_STEP_SUMMARY
          fi
